    value: "https://YOUR_BSC_TESTNET_RPC"
  - name: CHAIN_WS_URL
    value: "wss://YOUR_BSC_TESTNET_WS"
  - name: CHAIN_CONTRACT_ADDRESS
    value: "0xYourLotteryContract"
