{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "blockchain-lottery-indexer.fullname" . }}
  labels:
    {{- include "blockchain-lottery-indexer.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "blockchain-lottery-indexer.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: management
      path: {{ .Values.serviceMonitor.path }}
      interval: {{ .Values.serviceMonitor.interval }}
{{- end }}
