apiVersion: v1
kind: Service
metadata:
  name: {{ include "blockchain-lottery-indexer.fullname" . }}
  labels:
    {{- include "blockchain-lottery-indexer.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      name: http
    - port: {{ .Values.service.managementPort }}
      targetPort: management
      name: management
  selector:
    {{- include "blockchain-lottery-indexer.selectorLabels" . | nindent 4 }}
