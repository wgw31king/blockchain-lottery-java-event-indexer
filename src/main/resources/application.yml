spring:
  application:
    name: blockchain-lottery-java-event-indexer
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:blockchain_lottery}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    baseline-on-migrate: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  cache:
    type: ${CACHE_TYPE:redis}
    redis:
      time-to-live: ${CACHE_TTL_MS:30000}
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp:
        auth: false
        starttls.enable: false

server:
  port: ${SERVER_PORT:8081}

management:
  server:
    port: ${MANAGEMENT_SERVER_PORT:9090}
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  prometheus:
    metrics:
      export:
        enabled: true

app:
  security:
    jwt:
      secret: ${JWT_SECRET:change-me-use-openssl-rand-hex-32-for-production}
      issuer: ${JWT_ISSUER:blockchain-lottery-indexer}
      audience: ${JWT_AUDIENCE:api}
  api:
    mask-addresses: ${API_MASK_ADDRESSES:false}

lottery:
  alerting:
    enabled: ${ALERTING_ENABLED:false}
    email:
      enabled: ${ALERT_EMAIL_ENABLED:false}
      from: ${ALERT_EMAIL_FROM:indexer@localhost}
      to: ${ALERT_EMAIL_TO:ops@localhost}
    slack:
      enabled: ${ALERT_SLACK_ENABLED:false}
      webhook-url: ${ALERT_SLACK_WEBHOOK_URL:}
    cooldown-ms: ${ALERT_COOLDOWN_MS:60000}
  chain:
    rpc-url: ${CHAIN_RPC_URL:http://127.0.0.1:8545}
    ws-url: ${CHAIN_WS_URL:ws://127.0.0.1:8546}
    contract-address: ${CHAIN_CONTRACT_ADDRESS:0x0000000000000000000000000000000000000000}
    additional-contract-addresses: []
    chain-id: ${CHAIN_ID:31337}
    start-block: ${CHAIN_START_BLOCK:0}
    confirmations: ${CHAIN_CONFIRMATIONS:6}
    reorg-buffer-blocks: ${CHAIN_REORG_BUFFER_BLOCKS:24}
    poll-interval-ms: ${CHAIN_POLL_INTERVAL_MS:10000}
    max-blocks-per-poll: ${CHAIN_MAX_BLOCKS_PER_POLL:50}
    max-retry-attempts: ${CHAIN_MAX_RETRY_ATTEMPTS:5}
    retry-backoff-ms: ${CHAIN_RETRY_BACKOFF_MS:1000}
    ws-reconnect-backoff-ms: ${CHAIN_WS_RECONNECT_BACKOFF_MS:3000}
    abi-json-path: ${CHAIN_ABI_JSON_PATH:}
    enable-erc721-transfer: ${CHAIN_ENABLE_ERC721:false}
    enable-erc1155-transfer-single: ${CHAIN_ENABLE_ERC1155_SINGLE:false}
    enable-erc1155-transfer-batch: ${CHAIN_ENABLE_ERC1155_BATCH:false}
    # Binds to LotteryChainProperties; must be under lottery.chain (not lottery root).
    # Default off for local/API-only; set CHAIN_LISTENERS_ENABLED=true for indexer deployments.
    listeners-enabled: ${CHAIN_LISTENERS_ENABLED:false}
    event-definitions:
      - name: TicketPurchased
        signature: TicketPurchased(address,uint256,uint256)
        indexed-params:
          - player:address
        data-params:
          - roundId:uint256
          - ticketNo:uint256
      - name: PrizeClaimed
        signature: PrizeClaimed(address,uint256,uint256)
        indexed-params:
          - player:address
        data-params:
          - roundId:uint256
          - amount:uint256

logging:
  level:
    root: INFO
    com.example.blockchainlottery: INFO

---
spring:
  config.activate.on-profile: test
  data:
    redis:
      host: localhost
  cache:
    type: simple
